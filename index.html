<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>Rasu Shop</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 1. ШАПКА ПРИЛОЖЕНИЯ -->
    <!-- Логотип и фиксированная навигация сверху -->
    <header id="app-header">
        <h1 id="app-logo">
            <svg id="_Слой_1" data-name="Слой_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 986.54 265">
                <!-- Логотип Rasu Shop -->
                <defs><style>.st0{fill:#fff;}</style></defs>
                <path class="st0" d="M198.86,1.6c-2.75-.15..."/>
                <path class="st0" d="M671.88,18.65c-16.94-12.43..."/>
                <path class="st0" d="M920.4,7.09l-28.84,135.71..."/>
                <path class="st0" d="M410.77,17.39c-7.49-4.28..."/>
            </svg>
        </h1>
    </header>

    <!-- 2. ОСНОВНОЙ КОНТЕНТ -->
    <!-- Центральная область: фильтры + контент (каталог, корзина и т.д.) -->
    <main id="app-main">
        
        <!-- Фильтры категорий товаров -->
        <section id="category-filter"></section>

        <!-- Контейнер для динамического контента -->
        <section id="content"></section>
    </main>

    <!-- 3. МОДАЛЬНОЕ ОКНО -->
    <!-- Универсальное окно для деталей товара, опросов и форм -->
    <div id="modal-overlay" class="hidden">
        <div id="modal" class="modal">
            <button id="modal-close" class="modal-close">×</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- 4. НИЖНЯЯ НАВИГАЦИЯ -->
    <!-- Быстрый переход между основными экранами приложения -->
    <nav id="bottom-nav">
        
        <!-- Каталог товаров -->
        <button data-screen="catalog" class="nav-btn active" aria-label="Каталог">
            <svg class="nav-icon cat1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                <path d="M13.7,2.36c-.69-.62..."/>
            </svg>
            <svg class="nav-icon cat2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                <path d="M15.18,16.81c0-1.48..."/>
            </svg>
        </button>

        <!-- Корзина -->
        <button data-screen="cart" class="nav-btn" aria-label="Корзина">
            <svg class="nav-icon cart1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                <path d="M8.47,20.3c-.23-.1..."/>
            </svg>
            <svg class="nav-icon cart2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                <path d="M5.05,3.57c-.17-1.44..."/>
            </svg>
        </button>

        <!-- Профиль пользователя -->
        <button data-screen="account" class="nav-btn" aria-label="Аккаунт">
            <svg class="nav-icon acc1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                <path d="M19.36,24.25h1.96..."/>
            </svg>
            <svg class="nav-icon acc2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                <path d="M21.31,19.31c0-2.68..."/>
            </svg>
        </button>

        <!-- Информация о проекте -->
        <button data-screen="about" class="nav-btn" aria-label="Кто мы">
            <svg class="nav-icon inf1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                <path d="M12.49.75C6.01.75..."/>
            </svg>
            <svg class="nav-icon inf2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
                <path d="M12.49.75C6.09.75..."/>
            </svg>
        </button>
    </nav>

    <!-- Подключение Telegram WebApp SDK и основного скрипта -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>

</body>
</html>
